<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Repair Estimator Polska</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top right, rgba(249, 115, 22, 0.18), transparent 24%),
                radial-gradient(circle at left bottom, rgba(8, 145, 178, 0.14), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #fff7ed 50%, #ecfeff 100%);
            color: #132238;
        }
        .page { max-width: 1080px; margin: 0 auto; padding: 72px 24px 120px; }
        .hero {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(10px);
        }
        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #ffedd5;
            color: #c2410c;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        h1 { margin: 18px 0 12px; font-size: clamp(34px, 6vw, 58px); line-height: 1.02; }
        p { margin: 0; max-width: 720px; font-size: 18px; line-height: 1.7; color: #475569; }
        .actions { margin-top: 28px; display: flex; gap: 14px; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 14px 18px; border-radius: 18px; font-weight: 700; text-decoration: none;
        }
        .btn-primary { background: linear-gradient(135deg, #f97316, #0891b2); color: white; }
        .btn-secondary { background: white; color: #132238; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <span class="badge">AI Repair Estimator PL</span>
            <h1>Inteligentna wycena naprawy Apple i Samsung</h1>
            <p>
                Widget dziala jako polski chat serwisowy. Klient moze opisac problem, dodac zdjecie lub
                video do 15 sekund, a Gemini przygotuje diagnoze i orientacyjna wycene w PLN.
            </p>
            <div class="actions">
                <a class="btn btn-primary" href="/admin-panel">Otworz panel administracyjny</a>
                <a class="btn btn-secondary" href="/docs">Swagger API</a>
            </div>
        </section>
    </main>

    <script
        src="/static/widget.js"
        data-api-base-url="http://127.0.0.1:8000"
        data-title="Wycena naprawy"
        data-accent-label="AI Diagnostyka"
    ></script>
</body>
</html>
